version: '3.8'

services:
  threat-intel-db:
    image: postgres:15-alpine
    container_name: threat-intel-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword123
      POSTGRES_DB: threat_intel
    ports:
      - "5433:5432"
    volumes:
      - threat_intel_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d threat_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

  threat-intel-backend:
    build: ./backend
    container_name: threat-intel-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:securepassword123@threat-intel-db:5432/threat_intel
      - THREAT_INTEL_MOCK_MODE=false
      # Make sure to replace these with actual API keys in production
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - OTX_API_KEY=${OTX_API_KEY:-}
    ports:
      - "8001:8000"
    depends_on:
      threat-intel-db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  threat_intel_data:
